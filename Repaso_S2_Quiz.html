<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repaso Sesión 2 · West Telco</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#0d44c3;--dark:#05409f;--deep:#03286a;--light:#4ee5ff;--mint:#04e5b3;
--ink:#1a2340;--muted:#6b7590;--fun:'Baloo 2',sans-serif;--body:'Inter',sans-serif;--bad:#ff5a4e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--body);color:var(--ink);min-height:100vh;
background:radial-gradient(1100px 600px at 70% -10%,#eaf1ff,#dfe9ff 45%,#cddcff)}
.wrap{max-width:820px;margin:0 auto;padding:24px 20px 60px}
.bar{display:flex;align-items:center;justify-content:space-between;border-radius:18px;padding:14px 22px;
background:linear-gradient(120deg,var(--blue),var(--dark) 55%,var(--deep));box-shadow:0 12px 30px rgba(5,64,159,.28)}
.bar .l{display:flex;align-items:center;gap:14px}
.bar img{height:24px}.bar .sep{width:1px;height:24px;background:rgba(255,255,255,.28)}
.bar small{display:block;font-family:var(--fun);font-weight:700;font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--light)}
.bar b{font-family:var(--fun);font-weight:800;font-size:18px;color:#fff}
.score{font-family:var(--fun);font-weight:800;color:var(--deep);background:var(--light);padding:8px 16px;border-radius:999px;font-size:15px}

.card{margin-top:24px;background:#fff;border-radius:22px;padding:28px;box-shadow:0 18px 50px rgba(5,64,159,.14)}
.qnum{font-family:var(--fun);font-weight:700;color:var(--muted);font-size:13px;letter-spacing:.1em;text-transform:uppercase}
.qtext{font-family:var(--fun);font-weight:800;font-size:24px;color:var(--dark);line-height:1.3;margin:10px 0 20px}
.answers{display:grid;gap:12px}
.ans{font-family:var(--body);font-weight:600;font-size:16px;text-align:left;border:2.5px solid #c7d6ff;background:#f6f9ff;
color:var(--ink);border-radius:14px;padding:15px 18px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:12px}
.ans .key{font-family:var(--fun);font-weight:800;color:#fff;background:var(--blue);border-radius:8px;
width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.ans:hover{border-color:var(--blue);transform:translateX(3px)}
.ans.correct{border-color:var(--mint);background:#eafff9}
.ans.correct .key{background:var(--mint);color:var(--deep)}
.ans.wrong{border-color:var(--bad);background:#fff2f0}
.ans.wrong .key{background:var(--bad)}
.ans:disabled{cursor:default}
.explain{margin-top:16px;border-radius:13px;padding:14px 17px;font-size:14.5px;line-height:1.55;display:none}
.explain.ok{display:block;background:#eafff9;border:2px solid #9ff0dc;color:#0a6b52}
.explain.no{display:block;background:#fff2f0;border:2px solid #ffc9c2;color:#a33325}
.explain b{font-family:var(--fun)}
.nextbtn{margin-top:16px;font-family:var(--fun);font-weight:800;font-size:15px;color:#fff;background:var(--blue);
border:none;border-radius:12px;padding:12px 26px;cursor:pointer;display:none}
.nextbtn:hover{background:var(--dark)}
.progress{height:10px;background:#e4ecff;border-radius:99px;margin-top:22px;overflow:hidden}
.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--light),var(--mint));transition:width .4s}

.final{display:none;text-align:center;padding:10px 0}
.final .medal{font-size:66px}
.final h2{font-family:var(--fun);font-weight:800;font-size:28px;color:var(--dark);margin:8px 0}
.final p{color:var(--muted);font-size:15.5px;max-width:540px;margin:0 auto 18px;line-height:1.6}
.golden{background:linear-gradient(120deg,var(--blue),var(--dark));color:#fff;border-radius:16px;padding:17px 20px;
max-width:600px;margin:0 auto 20px;font-size:14.5px;line-height:1.6;text-align:left}
.golden b{color:var(--light);font-family:var(--fun)}
.again{font-family:var(--fun);font-weight:800;font-size:15px;color:var(--deep);background:var(--mint);
border:none;border-radius:12px;padding:12px 26px;cursor:pointer}
.foot{margin-top:20px;text-align:center;color:var(--muted);font-size:12.5px}
@media(max-width:520px){.qtext{font-size:20px}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

 {q:"¿Cuál era tu misión de la semana?",
  a:["Vender EDB de inmediato a todos","Escuchar y anotar si un cliente dice alguna frase-señal","Instalar una base de datos","Aprender a programar"],c:1,
  ok:"Eso es: todavía no vendemos, solo afinamos el oído. 👂",
  no:"La misión era solo escuchar: anotar cuando un cliente diga una frase-señal."},
];
let i=0,score=0,answered=false;
const qnum=document.getElementById('qnum'),qtext=document.getElementById('qtext'),
answers=document.getElementById('answers'),explain=document.getElementById('explain'),
nextbtn=document.getElementById('nextbtn'),pbar=document.getElementById('pbar'),pts=document.getElementById('pts');
document.getElementById('max').textContent=Q.length*10;
const K=['A','B','C','D'];
function load(){
  answered=false;
  const x=Q[i];
  qnum.textContent=`Pregunta ${i+1} de ${Q.length}`;
  qtext.textContent=x.q;
  explain.className='explain';explain.textContent='';
  nextbtn.style.display='none';
  answers.innerHTML='';
  x.a.forEach((t,j)=>{
    const b=document.createElement('button');b.className='ans';
    b.innerHTML=`<span class="key">${K[j]}</span><span>${t}</span>`;
    b.onclick=()=>pick(b,j);
    answers.appendChild(b);
  });
  pbar.style.width=(i/Q.length*100)+'%';
}
function pick(btn,j){
  if(answered)return;answered=true;
  const x=Q[i];
  [...answers.children].forEach((b,k)=>{b.disabled=true;if(k===x.c)b.classList.add('correct');});
  if(j===x.c){score+=10;pts.textContent=score;explain.className='explain ok';explain.innerHTML='<b>✅ ¡Correcto!</b> '+x.ok;}
  else{btn.classList.add('wrong');explain.className='explain no';explain.innerHTML='<b>🤔 Aún no…</b> '+x.no;}
  nextbtn.style.display='inline-block';
  pbar.style.width=((i+1)/Q.length*100)+'%';
}
nextbtn.onclick=()=>{
  i++;
  if(i<Q.length)load();
  else{
    document.getElementById('quiz').style.display='none';
    const f=document.getElementById('final');f.style.display='block';
    const t=document.getElementById('ftitle'),m=document.getElementById('fmsg'),md=document.getElementById('medal');
    const max=Q.length*10;
    if(score===max){md.textContent='🏆';t.textContent='¡Perfecto! '+score+' / '+max;
      m.textContent='Dominas la Sesión 2 por completo. Estás listo para la Sesión 3: ¿dónde viven los datos?';}
    else if(score>=max*0.7){md.textContent='🥈';t.textContent='¡Muy bien! '+score+' / '+max;
      m.textContent='Casi perfecto. Dale una leída rápida al brochure de la Sesión 2 y quedas al 100.';}
    else{md.textContent='💪';t.textContent='¡Sigue así! '+score+' / '+max;
      m.textContent='Repasa el brochure de la Sesión 2 (la libreta mágica) y vuelve a intentarlo: seguro mejoras.';}
  }
};
function restart(){i=0;score=0;pts.textContent=0;
document.getElementById('final').style.display='none';
document.getElementById('quiz').style.display='block';load();}
load();
</script>
</body>
</html>
